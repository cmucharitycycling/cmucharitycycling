<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เช็คสถานะ — CMU Charity Cycling</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600;700&family=IBM+Plex+Sans+Thai+Condensed:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark:   #0d0b14;
      --purple: #2c263f;
      --yellow: #f1c40f;
      --yellow2:#e6b800;
      --white:  #f0ede8;
      --muted:  rgba(240,237,232,0.5);
      --border: rgba(255,255,255,0.08);
      --card:   rgba(255,255,255,0.04);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans Thai', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; padding-top: 80px; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; background: rgba(13,11,20,0.95); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'IBM Plex Sans Thai Condensed', sans-serif; font-size: 22px; letter-spacing: 0.12em; color: var(--yellow); text-decoration: none; font-weight: 700; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { color: var(--muted); font-size: 14px; font-weight: 300; text-decoration: none; letter-spacing: 0.06em; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--white); }
    .nav-cta { background: var(--yellow); color: var(--dark); padding: 8px 20px; border-radius: 4px; font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.2s; }
    .nav-cta:hover { background: var(--yellow2); }

    /* PAGE HEADER */
    .page-header { max-width: 700px; margin: 0 auto; padding: 50px 40px 40px; }
    .page-eyebrow { font-size: 11px; font-weight: 300; letter-spacing: 0.25em; color: var(--yellow); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .page-eyebrow::before { content: '⌕'; font-size: 14px; }
    .page-title { font-family: 'IBM Plex Sans Thai Condensed', sans-serif; font-size: clamp(36px, 6vw, 64px); letter-spacing: 0.04em; color: var(--white); font-weight: 700; margin-bottom: 8px; }
    .page-sub { font-size: 14px; font-weight: 300; color: var(--muted); }

    /* SEARCH */
    .search-wrap { max-width: 700px; margin: 0 auto; padding: 0 40px 40px; }
    .search-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 24px;
    }
    .search-label { font-size: 11px; font-weight: 300; letter-spacing: 0.2em; color: var(--yellow); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .search-label::before { content: '//'; font-size: 12px; font-weight: 700; opacity: 0.6; }
    .search-row { display: flex; gap: 10px; }
    .search-input {
      flex: 1; padding: 12px 16px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 4px; color: var(--white);
      font-family: 'IBM Plex Sans Thai'; font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--yellow); }
    .search-input::placeholder { color: rgba(255,255,255,0.2); }
    .btn-search {
      padding: 12px 24px; background: var(--yellow); color: var(--dark);
      border: none; border-radius: 4px;
      font-family: 'IBM Plex Sans Thai'; font-size: 14px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: background 0.2s;
      letter-spacing: 0.04em;
    }
    .btn-search:hover { background: var(--yellow2); }
    .btn-search:disabled { background: rgba(255,255,255,0.1); color: var(--muted); cursor: not-allowed; }

    /* RESULTS */
    .result-wrap { max-width: 700px; margin: 0 auto; padding: 0 40px 60px; }
    .result-count { font-size: 11px; font-weight: 300; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
    .result-count::before { content: '§'; font-size: 13px; color: var(--yellow); }

    .result-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 20px 24px;
      margin-bottom: 12px;
      border-left: 3px solid var(--yellow);
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .card-name { font-size: 18px; font-weight: 600; color: var(--white); display: flex; align-items: center; gap: 8px; }
    .card-name::before { content: '◈'; font-size: 12px; color: var(--yellow); }
    .card-total {
      font-family: 'IBM Plex Sans Thai Condensed', sans-serif;
      font-size: 20px; font-weight: 700;
      color: var(--yellow); letter-spacing: 0.04em;
    }

    .card-row { display: flex; gap: 8px; margin-bottom: 8px; font-size: 14px; flex-wrap: wrap; align-items: flex-start; }
    .card-label { color: var(--muted); font-size: 11px; font-weight: 300; letter-spacing: 0.15em; text-transform: uppercase; min-width: 70px; padding-top: 2px; display: flex; align-items: center; gap: 4px; }
    .card-label::before { font-size: 10px; color: var(--yellow); opacity: 0.7; }
    .card-label-tel::before  { content: '◎'; }
    .card-label-item::before { content: '▸'; }
    .card-label-addr::before { content: '⌖'; }
    .card-value { color: var(--white); font-weight: 300; flex: 1; line-height: 1.6; }
    .card-value ul { list-style: none; padding: 0; }
    .card-value ul li::before { content: '—  '; color: var(--yellow); opacity: 0.5; font-size: 12px; }

    .card-date { font-size: 11px; font-weight: 300; color: rgba(240,237,232,0.3); margin-top: 14px; text-align: right; letter-spacing: 0.06em; display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
    .card-date::before { content: '◷'; font-size: 12px; }

    /* STATES */
    .state-box { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 60px 20px; text-align: center; }
    .state-icon { font-size: 36px; font-weight: 700; color: var(--yellow); opacity: 0.3; margin-bottom: 12px; font-family: 'IBM Plex Sans Thai Condensed', sans-serif; letter-spacing: -0.02em; }
    .state-text { font-size: 15px; font-weight: 300; color: var(--muted); }
    .state-sub  { font-size: 13px; font-weight: 300; color: rgba(240,237,232,0.25); margin-top: 6px; }

    .loading-text { font-size: 13px; font-weight: 300; color: var(--yellow); letter-spacing: 0.15em; text-transform: uppercase; text-align: center; padding: 40px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .loading-text::before { content: '◌'; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MOBILE */
    @media (max-width: 600px) {
      nav { padding: 16px 20px; }
      .nav-links { display: none; }
      .page-header, .search-wrap, .result-wrap { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">CMU CHARITY CYCLING</a>
  <ul class="nav-links">
    <li><a href="order.html">สั่งซื้อ</a></li>
    <li><a href="status.html" class="active">เช็คสถานะ</a></li>
    <li><a href="riders.html">นักปั่น</a></li>
  </ul>
  <a href="order.html" class="nav-cta">สั่งของที่ระลึก</a>
</nav>

<div class="page-header">
  <p class="page-eyebrow">Order Status</p>
  <h1 class="page-title">เช็คสถานะ<br>การสั่งซื้อ</h1>
  <p class="page-sub">พิมพ์ชื่อ-นามสกุล หรือเบอร์โทรศัพท์ที่ใช้สั่งซื้อ</p>
</div>

<div class="search-wrap">
  <div class="search-box">
    <div class="search-label">ค้นหาออเดอร์</div>
    <div class="search-row">
      <input type="text" id="keyword" class="search-input" placeholder="ชื่อ หรือ 08xxxxxxxxx">
      <button onclick="search()" id="btnSearch" class="btn-search">ค้นหา</button>
    </div>
  </div>
</div>

<div class="result-wrap" id="result-area"></div>

<footer style="border-top:1px solid var(--border);padding:40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;max-width:700px;margin:0 auto;">
  <a href="index.html" style="font-family:'IBM Plex Sans Thai Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:0.12em;color:var(--yellow);text-decoration:none;">CMU CHARITY CYCLING</a>
  <p style="font-size:12px;font-weight:300;color:rgba(240,237,232,0.25);letter-spacing:0.06em;">© 2569 สมาคมนักศึกษาเก่า มหาวิทยาลัยเชียงใหม่</p>
</footer>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZws6bJdu07KjM_oYYZ_3AuJPLcZpNl5GpCMc3VmUhTm4KNzpjoZx7UPxxdL8mU44l/exec";

  document.getElementById('keyword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') search();
  });

  async function search() {
    const keyword = document.getElementById('keyword').value.trim();
    if (!keyword) return alert("กรุณาพิมพ์ชื่อหรือเบอร์โทรก่อนค้นหา");
    const btn  = document.getElementById('btnSearch');
    const area = document.getElementById('result-area');
    btn.disabled = true; btn.innerText = "กำลังค้นหา...";
    area.innerHTML = `<div class="loading-text">กำลังโหลดข้อมูล</div>`;

    try {
      const res  = await fetch(`${WEB_APP_URL}?search=${encodeURIComponent(keyword)}`);
      const data = await res.json();

      if (!data.length) {
        area.innerHTML = `
          <div class="state-box">
            <div class="state-icon">404</div>
            <div class="state-text">ไม่พบข้อมูลการสั่งซื้อ</div>
            <div class="state-sub">กรุณาตรวจสอบชื่อหรือเบอร์โทรให้ถูกต้อง</div>
          </div>`;
        return;
      }

      area.innerHTML = `<div class="result-count">พบ ${data.length} รายการ</div>`;
      data.forEach((order, i) => {
        const itemLines = order.details.split("),").map((d, idx, arr) =>
          `<li>${d.trim()}${idx < arr.length - 1 ? ')' : ''}</li>`).join("");
        area.innerHTML += `
          <div class="result-card" style="animation-delay:${i*0.05}s">
            <div class="card-top">
              <div class="card-name">${order.name}</div>
              <div class="card-total">฿${Number(order.total).toLocaleString()}</div>
            </div>
            <div class="card-row">
              <span class="card-label card-label-tel">โทร</span>
              <span class="card-value">${order.tel}</span>
            </div>
            <div class="card-row">
              <span class="card-label card-label-item">รายการ</span>
              <span class="card-value"><ul>${itemLines}</ul></span>
            </div>
            ${order.address ? `
            <div class="card-row">
              <span class="card-label card-label-addr">ที่อยู่</span>
              <span class="card-value">${order.address}</span>
            </div>` : ''}
            <div class="card-date">${order.date}</div>
          </div>`;
      });

    } catch (err) {
      area.innerHTML = `
        <div class="state-box">
          <div class="state-icon">ERR</div>
          <div class="state-text">เกิดข้อผิดพลาด</div>
          <div class="state-sub">กรุณาลองใหม่อีกครั้ง</div>
        </div>`;
    } finally {
      btn.disabled = false; btn.innerText = "ค้นหา";
    }
  }
</script>
</body>
</html>
