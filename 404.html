<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png?v=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — CMU Charity Cycling</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600;700&family=IBM+Plex+Sans+Thai+Condensed:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark:   #0d0b14;
      --yellow: #f1c40f;
      --yellow2:#e6b800;
      --white:  #f0ede8;
      --muted:  rgba(240,237,232,0.5);
      --border: rgba(255,255,255,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans Thai', sans-serif;
      background: var(--dark); color: var(--white);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 20px;
    }

    .num {
      font-family: 'IBM Plex Sans Thai Condensed', sans-serif;
      font-size: clamp(100px, 25vw, 200px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      color: transparent;
      -webkit-text-stroke: 2px rgba(241,196,15,0.2);
      margin-bottom: 8px;
      user-select: none;
    }

    .label {
      font-size: 11px; font-weight: 300;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--yellow); margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .label::before, .label::after { content: '—'; opacity: 0.4; }

    .title {
      font-family: 'IBM Plex Sans Thai Condensed', sans-serif;
      font-size: clamp(24px, 5vw, 40px);
      font-weight: 700; color: var(--white);
      margin-bottom: 12px;
    }

    .sub {
      font-size: 14px; font-weight: 300;
      color: var(--muted); line-height: 1.8;
      max-width: 400px; margin: 0 auto 36px;
    }

    .btn-home {
      background: var(--yellow); color: var(--dark);
      padding: 13px 32px; border-radius: 2px;
      font-family: 'IBM Plex Sans Thai'; font-size: 15px; font-weight: 700;
      text-decoration: none; letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.15s;
      display: inline-block;
    }
    .btn-home:hover { background: var(--yellow2); transform: translateY(-2px); }

    .links {
      display: flex; gap: 24px; margin-top: 20px;
      flex-wrap: wrap; justify-content: center;
    }
    .links a {
      color: var(--muted); font-size: 13px; font-weight: 300;
      text-decoration: none; letter-spacing: 0.08em;
      transition: color 0.2s;
      display: flex; align-items: center; gap: 4px;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
    }
    .links a::before { content: '◈'; font-size: 10px; color: var(--yellow); opacity: 0.5; }
    .links a:hover { color: var(--white); }

    .divider {
      width: 1px; height: 40px;
      background: var(--border);
      margin: 32px auto;
    }
  </style>
</head>
<body>

  <div class="num">404</div>
  <div class="label">Page Not Found</div>
  <h1 class="title">ไม่พบหน้าที่คุณต้องการ</h1>
  <p class="sub">ลิงก์อาจถูกลบหรือพิมพ์ URL ผิดพลาด<br>ลองกลับไปหน้าหลักแล้วเริ่มใหม่ได้เลยครับ</p>

  <a href="index.html" class="btn-home">← กลับหน้าหลัก</a>

  <div class="divider"></div>

  <div class="links">
    <a href="order.html">สั่งของที่ระลึก</a>
    <a href="status.html">เช็คสถานะ</a>
    <a href="riders.html">ทะเบียนนักปั่น</a>
    <a href="donate.html">บริจาค</a>
    <a href="https://forms.gle/ir2cG4w7jTnj2szc9" target="_blank">สมัครเข้าร่วม</a>
  </div>

</body>
</html>
